services:
  app:
    image: ghcr.io/${GHCR_USER}/todo-api:${APP_VERSION}
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
      DATABASE_PATH: /var/lib/todo-api/todos.db
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - todo-data:/var/lib/todo-api
    networks:
      - todo-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - todo-net
    depends_on:
      app:
        condition: service_healthy

volumes:
  todo-data:

networks:
  todo-net:
    driver: bridge
